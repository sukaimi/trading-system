<script>
const canvas = document.getElementById('floor');
const ctx = canvas.getContext('2d');

const dpr = window.devicePixelRatio || 1;
function resize() {
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ── Animation globals ──────────────────────────────────────────
let animTime = 0;
let lastFrameTime = 0;

// ── Live data layer (connects to existing backend APIs) ────────
const liveData = {
  market: null,           // { BTC: 87241, ETH: 2148, ... }
  priceHistory: null,     // { BTC: [p1,p2,...], ETH: [...], ... }
  equityHistory: null,    // [{ timestamp, total_equity }, ...]
  portfolio: null,        // { cash, positions, total_equity, ... }
  prevMarket: null,       // previous prices for change calculation
  scheduler: null,        // [{ name, interval, unit, at_time, next_run }, ...]
  connected: false,
  lastFetch: 0,
  wsConnected: false,
};

const LIVE_POLL_INTERVAL = 30000; // 30s

async function fetchLiveData() {
  try {
    const [mkt, hist, equity, port, sched] = await Promise.all([
      fetch('/api/market').then(r => r.ok ? r.json() : null).catch(() => null),
      fetch('/api/price-history').then(r => r.ok ? r.json() : null).catch(() => null),
      fetch('/api/equity-history').then(r => r.ok ? r.json() : null).catch(() => null),
      fetch('/api/portfolio').then(r => r.ok ? r.json() : null).catch(() => null),
      fetch('/api/scheduler').then(r => r.ok ? r.json() : null).catch(() => null),
    ]);
    if (mkt && Object.keys(mkt).length > 0) {
      // Normalize: API returns {BTC: {price: 87241, ...}} — flatten to {BTC: 87241}
      const flat = {};
      for (const [sym, val] of Object.entries(mkt)) {
        flat[sym] = (val && typeof val === 'object') ? (val.price || 0) : (val || 0);
      }
      if (liveData.market) liveData.prevMarket = { ...liveData.market };
      liveData.market = flat;
      liveData.connected = true;
    }
    if (hist) liveData.priceHistory = hist;
    if (equity) liveData.equityHistory = equity;
    if (port) liveData.portfolio = port;
    if (sched) liveData.scheduler = sched;
    liveData.lastFetch = Date.now();
  } catch (e) {
    // Silently fail — static fallback will be used
  }
}

// WebSocket for real-time pipeline events → agent animations
let _eventWs = null;
const _eventQueue = [];

function connectEventWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${proto}//${location.host}/ws`;
  try {
    _eventWs = new WebSocket(url);
    _eventWs.onopen = () => { liveData.wsConnected = true; };
    _eventWs.onclose = () => {
      liveData.wsConnected = false;
      setTimeout(connectEventWS, 5000); // reconnect
    };
    _eventWs.onerror = () => { liveData.wsConnected = false; };
    _eventWs.onmessage = (e) => {
      try {
        const event = JSON.parse(e.data);
        _eventQueue.push(event);
      } catch (_) {}
    };
  } catch (_) {
    setTimeout(connectEventWS, 5000);
  }
}

// Map pipeline events to agent walking animations
const EVENT_TO_ANIMATION = {
  'pipeline:news_scan_complete':         { agent: 'NewsScout', target: 'Analyst',    pause: 1.5, label: 'Delivering news briefing' },
  'pipeline:thesis_generated':           { agent: 'Analyst',   target: 'Chart',      pause: 1.8, label: 'Checking technicals' },
  'pipeline:chart_analysis':             { agent: 'Analyst',   target: 'Devil',      pause: 2.0, label: "Devil's advocate review" },
  'pipeline:devil_verdict':              { agent: 'Analyst',   target: 'Risk',       pause: 1.5, label: 'Requesting risk check' },
  'pipeline:risk_check':                 { agent: 'Risk',      target: 'Executor',   pause: 1.0, label: 'Approving trade' },
  'pipeline:trade_executed':             { agent: 'Executor',  target: 'Journal',    pause: 1.2, label: 'Logging trade' },
  'pipeline:scheduled_analysis_start':   { agent: 'Analyst',   target: 'Strategist', pause: 2.0, label: 'Strategy consultation' },
  'circuit_breaker:triggered':           { agent: 'Circuit',   target: 'Strategist', pause: 3.0, label: 'CIRCUIT BREAKER!' },
};

let liveMode = false;
let lastLiveEventTime = 0;
const LIVE_MODE_TIMEOUT = 30000; // revert to demo after 30s of no events

function processLiveEvents() {
  while (_eventQueue.length > 0) {
    const event = _eventQueue.shift();
    const key = `${event.category}:${event.event_type}`;
    const anim = EVENT_TO_ANIMATION[key];
    if (anim) {
      liveMode = true;
      lastLiveEventTime = Date.now();
      const target = agents.find(a => a.name === anim.target);
      if (target) {
        const walker = agents.find(a => a.name === anim.agent);
        if (walker && walker.pantryTrip && walker.state !== 'idle') {
          recallFromPantry(anim.agent);
        }
        if (sendAgentTo(anim.agent, target.homeGx, target.homeGy, anim.pause)) {
          demo.label = anim.label;
          demo.labelAgent = anim.agent;
          setTimeout(() => {
            if (demo.labelAgent === anim.agent) {
              demo.label = '';
              demo.labelAgent = null;
            }
          }, (anim.pause + 4) * 1000);
        }
      }
    }
  }
  // Revert to demo mode after timeout with no live events
  if (liveMode && Date.now() - lastLiveEventTime > LIVE_MODE_TIMEOUT) {
    const anyBusy = agents.some(a => !a.npc && a.state !== 'idle');
    if (!anyBusy) liveMode = false;
  }
}

// Helper: format price for display
function fmtPrice(val) {
  if (val == null || val === 0) return '—';
  if (val >= 1000) return val.toLocaleString('en-US', { maximumFractionDigits: 0 });
  if (val >= 10) return val.toFixed(1);
  return val.toFixed(2);
}

function fmtChange(cur, prev) {
  if (!cur || !prev || prev === 0) return { text: '—', color: '#8b949e' };
  const pct = ((cur - prev) / prev * 100);
  const sign = pct >= 0 ? '+' : '';
  return {
    text: sign + pct.toFixed(1) + '%',
    color: pct >= 0 ? '#3fb950' : '#f85149',
  };
}

// Boot: initial fetch + WebSocket connection + polling
fetchLiveData();
connectEventWS();
setInterval(fetchLiveData, LIVE_POLL_INTERVAL);

// ── Responsive scale ───────────────────────────────────────────
const GRID_SIZE = 16;

function getLayout() {
  const W = window.innerWidth;
  const H = window.innerHeight;
  const isNarrow = W < 600;
  const padding = isNarrow ? 30 : Math.min(80, W * 0.06);
  const titleSpace = isNarrow ? 40 : 60;
  const tileFromW = (W - padding * 2) / (GRID_SIZE - 1);
  const usableH = H - titleSpace - padding * 0.5;
  const tileFromH = usableH / ((GRID_SIZE - 1) + 3);
  const tileH = Math.min(tileFromW / 2, tileFromH, 42);
  const tileW = tileH * 2;
  const s = tileW / 64;
  const diamondH = (GRID_SIZE - 1) * tileH;
  const originX = W / 2;
  const charAbove = 55 * s;
  const originY = titleSpace + charAbove + (usableH - charAbove - diamondH - 20 * s) / 2;
  return { tileW, tileH, s, originX, originY, titleSpace, padding, W, H };
}

function isoToScreen(gx, gy) {
  const { tileW, tileH, originX, originY } = getLayout();
  return {
    x: originX + (gx - gy) * (tileW / 2),
    y: originY + (gx + gy) * (tileH / 2)
  };
}

// ── Color utilities ────────────────────────────────────────────
function shadeColor(color, percent) {
  const num = parseInt(color.replace('#', ''), 16);
  const r = Math.min(255, Math.max(0, (num >> 16) + percent));
  const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + percent));
  const b = Math.min(255, Math.max(0, (num & 0x0000FF) + percent));
  return '#' + (0x1000000 + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

// ── Draw isometric floor tile ──────────────────────────────────
function drawTile(gx, gy, fillColor, strokeColor) {
  const { tileW, tileH } = getLayout();
  const { x, y } = isoToScreen(gx, gy);
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + tileW / 2, y + tileH / 2);
  ctx.lineTo(x, y + tileH);
  ctx.lineTo(x - tileW / 2, y + tileH / 2);
  ctx.closePath();
  ctx.fillStyle = fillColor;
  ctx.fill();
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth = 0.5;
  ctx.stroke();
}

// ── Draw isometric cube ────────────────────────────────────────
function drawCube(gx, gy, w, h, d, color) {
  const { tileW, tileH } = getLayout();
  const { x, y } = isoToScreen(gx, gy);
  const dark = shadeColor(color, -30);
  const light = shadeColor(color, 15);
  ctx.beginPath();
  ctx.moveTo(x, y - h);
  ctx.lineTo(x + (w * tileW) / 2, y - h + (w * tileH) / 2);
  ctx.lineTo(x, y - h + (w * tileH));
  ctx.lineTo(x - (d * tileW) / 2, y - h + (d * tileH) / 2);
  ctx.closePath();
  ctx.fillStyle = light;
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x - (d * tileW) / 2, y - h + (d * tileH) / 2);
  ctx.lineTo(x, y - h + (w * tileH));
  ctx.lineTo(x, y + (w * tileH));
  ctx.lineTo(x - (d * tileW) / 2, y + (d * tileH) / 2);
  ctx.closePath();
  ctx.fillStyle = dark;
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x, y - h + (w * tileH));
  ctx.lineTo(x + (w * tileW) / 2, y - h + (w * tileH) / 2);
  ctx.lineTo(x + (w * tileW) / 2, y + (w * tileH) / 2);
  ctx.lineTo(x, y + (w * tileH));
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

// ── Draw a monitor ─────────────────────────────────────────────
function drawMonitor(gx, gy, screenColor) {
  const { x, y } = isoToScreen(gx, gy);
  const { s } = getLayout();
  const deskH = 14 * s;
  ctx.fillStyle = '#6a7080';
  ctx.fillRect(x - 1 * s, y - deskH - 12 * s, 2 * s, 5 * s);
  ctx.fillStyle = '#3a4258';
  ctx.fillRect(x - 8 * s, y - deskH - 22 * s, 16 * s, 12 * s);
  ctx.fillStyle = screenColor;
  ctx.fillRect(x - 7 * s, y - deskH - 21 * s, 14 * s, 10 * s);
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(x - 6 * s, y - deskH - 20 * s, 4 * s, 8 * s);
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  for (let i = 0; i < 4; i++) {
    const w = (3 + (gx * 3 + i * 7) % 8) * s;
    ctx.fillRect(x - 5 * s, y - deskH - 19 * s + i * 2.5 * s, w, 1 * s);
  }
}

// ── Draw a large monitor (executive) ──────────────────────────
function drawLargeMonitor(gx, gy, screenColor) {
  const { x, y } = isoToScreen(gx, gy);
  const { s } = getLayout();
  const deskH = 14 * s;
  // Stand
  ctx.fillStyle = '#6a7080';
  ctx.fillRect(x - 1.5 * s, y - deskH - 15 * s, 3 * s, 7 * s);
  // Base plate
  ctx.fillStyle = '#5a6070';
  ctx.fillRect(x - 4 * s, y - deskH - 8 * s, 8 * s, 2 * s);
  // Frame
  ctx.fillStyle = '#3a4258';
  ctx.fillRect(x - 12 * s, y - deskH - 30 * s, 24 * s, 17 * s);
  // Screen
  ctx.fillStyle = screenColor;
  ctx.fillRect(x - 11 * s, y - deskH - 29 * s, 22 * s, 15 * s);
  // Glare
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.fillRect(x - 9 * s, y - deskH - 28 * s, 6 * s, 12 * s);
  // Data lines
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  for (let i = 0; i < 5; i++) {
    const w = (4 + (gx * 3 + i * 7) % 12) * s;
    ctx.fillRect(x - 8 * s, y - deskH - 27 * s + i * 3 * s, w, 1.2 * s);
  }
}

// ── Draw a chair ───────────────────────────────────────────────
function drawChair(gx, gy) {
  const { x, y } = isoToScreen(gx, gy);
  const { s } = getLayout();
  ctx.fillStyle = '#4a5060';
  ctx.fillRect(x - 5 * s, y - 8 * s, 10 * s, 3 * s);
  ctx.fillStyle = '#3a4050';
  ctx.fillRect(x - 5 * s, y - 16 * s, 10 * s, 8 * s);
  ctx.fillStyle = '#505868';
  ctx.fillRect(x - 4 * s, y - 15 * s, 8 * s, 6 * s);
  ctx.fillStyle = '#667';
  ctx.fillRect(x - 4 * s, y - 5 * s, 1.5 * s, 5 * s);
  ctx.fillRect(x + 2.5 * s, y - 5 * s, 1.5 * s, 5 * s);
  ctx.fillStyle = '#556';
  ctx.beginPath();
  ctx.arc(x - 4 * s, y + 1 * s, 1.2 * s, 0, Math.PI * 2);
  ctx.arc(x + 4 * s, y + 1 * s, 1.2 * s, 0, Math.PI * 2);
  ctx.fill();
}

// ── Draw executive chair (large, black, high-back) ────────────
function drawExecChair(gx, gy) {
  const { x, y } = isoToScreen(gx, gy);
  const { s } = getLayout();
  // 5-star base
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(x - 6 * s, y + 2 * s, 1.5 * s, 0, Math.PI * 2);
  ctx.arc(x + 6 * s, y + 2 * s, 1.5 * s, 0, Math.PI * 2);
  ctx.arc(x, y + 4 * s, 1.5 * s, 0, Math.PI * 2);
  ctx.arc(x - 4 * s, y + 4 * s, 1.2 * s, 0, Math.PI * 2);
  ctx.arc(x + 4 * s, y + 4 * s, 1.2 * s, 0, Math.PI * 2);
  ctx.fill();
  // Hydraulic post
  ctx.fillStyle = '#555';
  ctx.fillRect(x - 1.5 * s, y - 6 * s, 3 * s, 8 * s);
  // Seat (wide, padded)
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(x - 8 * s, y - 10 * s, 16 * s, 5 * s);
  ctx.fillStyle = '#222';
  ctx.fillRect(x - 7 * s, y - 9 * s, 14 * s, 3 * s);
  // High back
  ctx.fillStyle = '#111';
  ctx.fillRect(x - 7 * s, y - 28 * s, 14 * s, 18 * s);
  // Leather padding (subtle highlight)
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(x - 6 * s, y - 27 * s, 12 * s, 16 * s);
  // Tufted lines
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(x - 5 * s, y - 22 * s, 10 * s, 0.8 * s);
  ctx.fillRect(x - 5 * s, y - 17 * s, 10 * s, 0.8 * s);
  // Headrest
  ctx.fillStyle = '#151515';
  ctx.fillRect(x - 5 * s, y - 30 * s, 10 * s, 3 * s);
  ctx.fillStyle = '#1c1c1c';
  ctx.fillRect(x - 4 * s, y - 29 * s, 8 * s, 1.5 * s);
  // Armrests
  ctx.fillStyle = '#222';
  ctx.fillRect(x - 9 * s, y - 14 * s, 3 * s, 6 * s);
  ctx.fillRect(x + 6 * s, y - 14 * s, 3 * s, 6 * s);
  // Armrest tops (padded)
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(x - 10 * s, y - 15 * s, 4 * s, 2 * s);
  ctx.fillRect(x + 6 * s, y - 15 * s, 4 * s, 2 * s);
}

// ── Draw a potted plant ────────────────────────────────────────
function drawPlant(gx, gy) {
  const { x, y } = isoToScreen(gx, gy);
  const { s } = getLayout();
  ctx.fillStyle = '#6b4226';
  ctx.fillRect(x - 4 * s, y - 8 * s, 8 * s, 8 * s);
  ctx.fillStyle = '#7a4e2e';
  ctx.fillRect(x - 5 * s, y - 9 * s, 10 * s, 2 * s);
  ctx.fillStyle = '#3a2510';
  ctx.fillRect(x - 3 * s, y - 10 * s, 6 * s, 2 * s);
  ctx.fillStyle = '#2d8a4e';
  ctx.fillRect(x - 6 * s, y - 20 * s, 5 * s, 5 * s);
  ctx.fillRect(x + 1 * s, y - 22 * s, 5 * s, 5 * s);
  ctx.fillRect(x - 3 * s, y - 25 * s, 6 * s, 6 * s);
  ctx.fillStyle = '#3fb950';
  ctx.fillRect(x - 2 * s, y - 24 * s, 4 * s, 4 * s);
  ctx.fillRect(x - 5 * s, y - 18 * s, 3 * s, 3 * s);
  ctx.fillRect(x + 2 * s, y - 20 * s, 3 * s, 3 * s);
  ctx.fillStyle = '#2a6b3a';
  ctx.fillRect(x - 0.5 * s, y - 16 * s, 1 * s, 6 * s);
}

// ── Draw a wall ticker board (left wall, Strat's office, gy 0.5–4.5) ──
function drawTickerBoard() {
  const { s } = getLayout();

  // Left wall: gx=0, gy 5→13 (swapped with clocks — more space for 6 tickers)
  const pL = isoToScreen(0, 5);
  const pR = isoToScreen(0, 13);
  const wallDx = pR.x - pL.x;
  const wallDy = pR.y - pL.y;
  const wallLen = Math.sqrt(wallDx * wallDx + wallDy * wallDy);
  const ux = wallDx / wallLen;
  const uy = wallDy / wallLen;

  const scrH = 160 * s;
  const mountBot = 24 * s;

  const bl = { x: pL.x, y: pL.y - mountBot };
  const br = { x: pR.x, y: pR.y - mountBot };
  const tl = { x: pL.x, y: pL.y - mountBot - scrH };
  const tr = { x: pR.x, y: pR.y - mountBot - scrH };

  // Board background
  ctx.fillStyle = '#1a2238';
  ctx.beginPath();
  ctx.moveTo(tl.x, tl.y); ctx.lineTo(tr.x, tr.y);
  ctx.lineTo(br.x, br.y); ctx.lineTo(bl.x, bl.y);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#3a4a64';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Inner screen
  const m = 2 * s;
  ctx.fillStyle = '#0c1220';
  ctx.beginPath();
  ctx.moveTo(tl.x + ux * m, tl.y + uy * m + m);
  ctx.lineTo(tr.x - ux * m, tr.y - uy * m + m);
  ctx.lineTo(br.x - ux * m, br.y - uy * m - m);
  ctx.lineTo(bl.x + ux * m, bl.y + uy * m - m);
  ctx.closePath(); ctx.fill();

  // Content position: nx=0 starts at gy=5 end (br), reads toward gy=0 (bl)
  function sPos(nx, ny) {
    return { x: br.x - nx * wallDx, y: br.y - nx * wallDy - ny * scrH };
  }

  // Text sheared opposite to wall direction so it faces the room interior
  function wallText(text, nx, ny, align) {
    const p = sPos(nx, ny);
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.transform(-ux, -uy, 0, 1, 0, 0);
    ctx.textAlign = align || 'left';
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  // Title
  const titleFs = Math.max(8, Math.round(12 * s));
  ctx.font = `bold ${titleFs}px "SF Mono", "Courier New", monospace`;
  ctx.fillStyle = '#5a7a90';
  wallText('LIVE MARKETS', 0.04, 0.92);

  // Tickers — 2 rows x 3 columns (live data with static fallback)
  const TICKER_SYMBOLS = ['BTC', 'ETH', 'SPY', 'GLDM', 'NVDA', 'AAPL'];
  const STATIC_PRICES = { BTC: 87241, ETH: 2148, SPY: 512.3, GLDM: 45.20, NVDA: 892.1, AAPL: 178.4 };
  const tickers = TICKER_SYMBOLS.map(sym => {
    const price = (liveData.market && liveData.market[sym]) || STATIC_PRICES[sym];
    const prev = (liveData.prevMarket && liveData.prevMarket[sym]) || null;
    const chgInfo = prev ? fmtChange(price, prev) : { text: '—', color: '#8b949e' };
    if (!prev && liveData.priceHistory && liveData.priceHistory[sym] && liveData.priceHistory[sym].length >= 2) {
      const hist = liveData.priceHistory[sym];
      const oldP = hist[0], newP = hist[hist.length - 1];
      const ci = fmtChange(newP, oldP);
      chgInfo.text = ci.text;
      chgInfo.color = ci.color;
    }
    return { sym, val: fmtPrice(price), chg: chgInfo.text, color: chgInfo.color };
  });
  const symFs = Math.max(8, Math.round(13 * s));
  const valFs = Math.max(7, Math.round(11 * s));
  const cols = 3;
  const colW = 0.88 / cols;

  tickers.forEach((t, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const nx = 0.06 + col * colW;
    const ny = row === 0 ? 0.68 : 0.32;

    ctx.font = `bold ${symFs}px "SF Mono", "Courier New", monospace`;
    ctx.fillStyle = '#c9d1d9';
    wallText(t.sym, nx, ny);

    ctx.font = `${valFs}px "SF Mono", "Courier New", monospace`;
    ctx.fillStyle = t.color;
    wallText('$' + t.val + '  ' + t.chg, nx, ny - 0.12);
  });
}

// ── Scheduler countdown clocks (left wall, pyramid below ticker) ─────
const CLOCK_TASKS = [
  { key: 'heartbeat',          label: 'HB' },
  { key: 'news_scan',          label: 'NEWS' },
  { key: 'asian_open',         label: 'ASIA' },
  { key: 'european_overlap',   label: 'EURO' },
  { key: 'us_close',           label: 'US' },
];

function getCountdown(task) {
  if (!task || !task.next_run) {
    return { text: '--:--', fraction: 1, remaining: Infinity };
  }
  const now = Date.now();
  const nextRun = new Date(task.next_run).getTime();
  const remaining = Math.max(0, nextRun - now);

  // Cycle duration from scheduler data
  let cycleMs;
  if (task.unit === 'minutes') cycleMs = task.interval * 60000;
  else if (task.unit === 'hours') cycleMs = task.interval * 3600000;
  else cycleMs = 86400000; // days/weeks default to 24h

  // fraction: 1 = just fired (full pie), 0 = about to fire (empty)
  const fraction = Math.min(1, remaining / cycleMs);

  const totalMins = Math.floor(remaining / 60000);
  const h = Math.floor(totalMins / 60);
  const m = totalMins % 60;
  const secs = Math.floor((remaining % 60000) / 1000);
  const text = h > 0 ? `${h}h ${m}m` : `${m}m ${secs}s`;
  return { text, fraction, remaining };
}

function drawSchedulerClocks() {
  const { s } = getLayout();

  // Left wall: gx=0, gy 0→5 (swapped with ticker — compact clock area)
  const pL = isoToScreen(0, 0);
  const pR = isoToScreen(0, 5);
  const wallDx = pR.x - pL.x;
  const wallDy = pR.y - pL.y;
  const wallLen = Math.sqrt(wallDx * wallDx + wallDy * wallDy);
  const ux = wallDx / wallLen;
  const uy = wallDy / wallLen;

  const scrH = 130 * s;
  const mountBot = 24 * s;
  const br = { x: pR.x, y: pR.y - mountBot };

  // Content position: flipped for left wall (reads gy=10 → gy=5.5)
  function sPos(nx, ny) {
    return { x: br.x - nx * wallDx, y: br.y - nx * wallDy - ny * scrH };
  }

  // Isometric text (faces room interior)
  function wallText(text, nx, ny, align) {
    const p = sPos(nx, ny);
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.transform(-ux, -uy, 0, 1, 0, 0);
    ctx.textAlign = align || 'center';
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  // Pyramid positions: centered on wall (nx=0.50, ny=0.50)
  const positions = [
    // Bottom row: ASIA, EURO, US (gap 0.22, centered)
    { nx: 0.28, ny: 0.32, idx: 2 },
    { nx: 0.50, ny: 0.32, idx: 3 },
    { nx: 0.72, ny: 0.32, idx: 4 },
    // Top row: HB, NEWS (gap 0.22, centered)
    { nx: 0.39, ny: 0.68, idx: 0 },
    { nx: 0.61, ny: 0.68, idx: 1 },
  ];

  const r = Math.max(12, 20 * s);
  const labelFs = Math.max(6, Math.round(8 * s));

  for (const pos of positions) {
    const clock = CLOCK_TASKS[pos.idx];
    const task = liveData.scheduler
      ? liveData.scheduler.find(t => t.name && t.name.includes(clock.key))
      : null;
    const cd = getCountdown(task);

    const center = sPos(pos.nx, pos.ny);

    ctx.save();
    ctx.translate(center.x, center.y);
    ctx.transform(-ux, -uy, 0, 1, 0, 0);

    // Dark background circle
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = '#0d1117';
    ctx.fill();

    // Pie wedge — remaining fraction depletes clockwise from 12 o'clock
    if (cd.fraction > 0.001) {
      const startAngle = -Math.PI / 2;
      const endAngle = startAngle + cd.fraction * Math.PI * 2;

      // Pick color: blue → amber → red as time runs out
      let pieColor;
      if (cd.remaining < 60000) pieColor = '#f85149';       // < 1 min: red
      else if (cd.fraction < 0.10) pieColor = '#d29922';    // < 10%: amber
      else pieColor = '#1f6feb';                             // normal: blue

      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, r * 0.88, startAngle, endAngle);
      ctx.closePath();
      ctx.fillStyle = pieColor;
      ctx.globalAlpha = 0.7;
      ctx.fill();
      ctx.globalAlpha = 1.0;
    }

    // Outer ring border
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.strokeStyle = '#30363d';
    ctx.lineWidth = Math.max(1.5, 2 * s);
    ctx.stroke();

    // Thin inner ring for depth
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.88, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Countdown text centered inside the pie
    const innerFs = Math.max(7, Math.round(r * 0.36));
    ctx.font = `bold ${innerFs}px "SF Mono", "Courier New", monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = cd.remaining < 60000 ? '#f85149' : '#c9d1d9';
    ctx.fillText(cd.text, 0, 0);

    ctx.restore();

    // Label below the pie
    ctx.font = `bold ${labelFs}px "SF Mono", "Courier New", monospace`;
    ctx.fillStyle = '#8b949e';
    wallText(clock.label, pos.nx, pos.ny - 0.10);
  }
}

// ── Draw massive wall display (right wall, upright like glass panels) ─
function drawWallDisplay() {
  const { s } = getLayout();

  // Screen spans gx 0.5–7.5 on right wall (gy=0)
  const pL = isoToScreen(0.5, 0);
  const pR = isoToScreen(7.5, 0);
  const wallDx = pR.x - pL.x;
  const wallDy = pR.y - pL.y;
  const wallLen = Math.sqrt(wallDx * wallDx + wallDy * wallDy);
  const ux = wallDx / wallLen;
  const uy = wallDy / wallLen;

  const scrH = 130 * s;
  const mountBot = 24 * s;

  // Parallelogram: bottom follows wall, sides go straight up
  const bl = { x: pL.x, y: pL.y - mountBot };
  const br = { x: pR.x, y: pR.y - mountBot };
  const tl = { x: pL.x, y: pL.y - mountBot - scrH };
  const tr = { x: pR.x, y: pR.y - mountBot - scrH };

  // Bezel
  ctx.fillStyle = '#1a1e2e';
  ctx.beginPath();
  ctx.moveTo(tl.x, tl.y);
  ctx.lineTo(tr.x, tr.y);
  ctx.lineTo(br.x, br.y);
  ctx.lineTo(bl.x, bl.y);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#3a4a64';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Screen surface (inset)
  const m = 2 * s;
  ctx.fillStyle = '#0c1525';
  ctx.beginPath();
  ctx.moveTo(tl.x + ux * m, tl.y + uy * m + m);
  ctx.lineTo(tr.x - ux * m, tr.y - uy * m + m);
  ctx.lineTo(br.x - ux * m, br.y - uy * m - m);
  ctx.lineTo(bl.x + ux * m, bl.y + uy * m - m);
  ctx.closePath();
  ctx.fill();

  // Helper: map normalized (nx 0→1 along wall, ny 0→1 upward) to screen
  function sPos(nx, ny) {
    return {
      x: bl.x + nx * wallDx,
      y: bl.y + nx * wallDy - ny * scrH
    };
  }

  // Isometric text helper
  function wallText(text, nx, ny, align) {
    const p = sPos(nx, ny);
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.transform(ux, uy, 0, 1, 0, 0);
    ctx.textAlign = align || 'left';
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  // ── Left: Equity curve (58%) ──
  const lblFs = Math.max(8, Math.round(12 * s));

  ctx.font = `bold ${lblFs}px "SF Mono", "Courier New", monospace`;
  ctx.fillStyle = '#5a7a90';
  wallText('PORTFOLIO EQUITY', 0.03, 0.93);

  // Grid lines
  ctx.strokeStyle = 'rgba(100,160,220,0.08)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < 4; i++) {
    const ny = 0.12 + i * 0.18;
    const gl = sPos(0.03, ny);
    const gr = sPos(0.55, ny);
    ctx.beginPath();
    ctx.moveTo(gl.x, gl.y);
    ctx.lineTo(gr.x, gr.y);
    ctx.stroke();
  }

  // Equity curve — live data or animated sine fallback
  const eqHist = liveData.equityHistory;
  const hasLiveEquity = eqHist && Array.isArray(eqHist) && eqHist.length >= 2;
  let curvePoints = [];

  if (hasLiveEquity) {
    // Extract equity values, normalize to 0–1 range
    const vals = eqHist.map(e => e.total_equity || e.equity || e.value || 0);
    const minE = Math.min(...vals), maxE = Math.max(...vals);
    const range = maxE - minE || 1;
    curvePoints = vals.map((v, i) => ({
      t: i / (vals.length - 1),
      val: (v - minE) / range,
    }));
    // Determine curve color from trend
    const trend = vals[vals.length - 1] >= vals[0];
    ctx.strokeStyle = trend ? '#3fb950' : '#f85149';
  } else {
    // Animated sine fallback
    for (let i = 0; i <= 30; i++) {
      const t = i / 30;
      const val = 0.5 + t * 0.15 +
        Math.sin(t * 8 + animTime * 0.15) * 0.08 +
        Math.sin(t * 3.2) * 0.12 +
        Math.cos(t * 5.5 + 1) * 0.06;
      curvePoints.push({ t, val: Math.max(0, Math.min(1, (val - 0.2) / 0.8)) });
    }
    ctx.strokeStyle = '#3fb950';
  }

  ctx.lineWidth = 1.5 * s;
  ctx.beginPath();
  curvePoints.forEach((pt, i) => {
    const p = sPos(0.03 + pt.t * 0.52, 0.12 + (0.15 + pt.val * 0.55));
    i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
  });
  ctx.stroke();

  // Fill under curve
  const cfR = sPos(0.55, 0.12);
  const cfL = sPos(0.03, 0.12);
  ctx.lineTo(cfR.x, cfR.y);
  ctx.lineTo(cfL.x, cfL.y);
  ctx.closePath();
  const fillColor = hasLiveEquity
    ? (ctx.strokeStyle === '#3fb950' ? 'rgba(63,185,80,0.1)' : 'rgba(248,81,73,0.1)')
    : 'rgba(63,185,80,0.1)';
  ctx.fillStyle = fillColor;
  ctx.fill();

  // Show current equity value if available
  if (hasLiveEquity) {
    const lastVal = eqHist[eqHist.length - 1];
    const eqVal = lastVal.total_equity || lastVal.equity || lastVal.value || 0;
    const eqFs = Math.max(7, Math.round(11 * s));
    ctx.font = `bold ${eqFs}px "SF Mono", "Courier New", monospace`;
    ctx.fillStyle = '#c9d1d9';
    wallText('$' + fmtPrice(eqVal), 0.03, 0.82);
  }

  // ── Divider ──
  const dT = sPos(0.59, 0.92);
  const dB = sPos(0.59, 0.06);
  ctx.strokeStyle = 'rgba(100,160,220,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(dT.x, dT.y);
  ctx.lineTo(dB.x, dB.y);
  ctx.stroke();

  // ── Right: Top 3 markets (38%) ──
  ctx.font = `bold ${lblFs}px "SF Mono", "Courier New", monospace`;
  ctx.fillStyle = '#5a7a90';
  wallText('TOP MARKETS', 0.62, 0.93);

  const MKT_SYMBOLS = ['BTC', 'ETH', 'SPY'];
  const MKT_STATIC = { BTC: 87241, ETH: 2148, SPY: 512.3 };
  const markets = MKT_SYMBOLS.map(sym => {
    const price = (liveData.market && liveData.market[sym]) || MKT_STATIC[sym];
    const prev = (liveData.prevMarket && liveData.prevMarket[sym]) || null;
    let chgInfo = prev ? fmtChange(price, prev) : { text: '—', color: '#8b949e' };
    if (!prev && liveData.priceHistory && liveData.priceHistory[sym] && liveData.priceHistory[sym].length >= 2) {
      const h = liveData.priceHistory[sym];
      chgInfo = fmtChange(h[h.length - 1], h[0]);
    }
    return { sym, price: fmtPrice(price), chg: chgInfo.text, color: chgInfo.color };
  });
  const symFs = Math.max(8, Math.round(13 * s));
  const valFs = Math.max(7, Math.round(11 * s));

  markets.forEach((mk, i) => {
    const ny = 0.75 - i * 0.22;

    ctx.font = `bold ${symFs}px "SF Mono", "Courier New", monospace`;
    ctx.fillStyle = '#c9d1d9';
    wallText(mk.sym, 0.62, ny);

    ctx.font = `${valFs}px "SF Mono", "Courier New", monospace`;
    ctx.fillStyle = '#8b949e';
    wallText('$' + mk.price, 0.62, ny - 0.07);

    ctx.fillStyle = mk.color;
    wallText(mk.chg, 0.96, ny, 'right');

    // Mini sparkline — live price history or animated sine fallback
    const sparkData = liveData.priceHistory && liveData.priceHistory[mk.sym];
    const hasSparkData = sparkData && sparkData.length >= 2;
    ctx.strokeStyle = mk.color;
    ctx.lineWidth = 1.0 * s;
    ctx.beginPath();
    if (hasSparkData) {
      const minV = Math.min(...sparkData), maxV = Math.max(...sparkData);
      const rng = maxV - minV || 1;
      const step = Math.max(1, Math.floor(sparkData.length / 8));
      for (let j = 0; j < Math.min(9, sparkData.length); j++) {
        const idx = Math.min(j * step, sparkData.length - 1);
        const sv = (sparkData[idx] - minV) / rng;
        const sp = sPos(0.82 + (j / 8) * 0.14, ny - 0.02 + sv * 0.05);
        j === 0 ? ctx.moveTo(sp.x, sp.y) : ctx.lineTo(sp.x, sp.y);
      }
    } else {
      for (let j = 0; j <= 8; j++) {
        const st = j / 8;
        const sv = Math.sin(st * 5 + i * 2 + animTime * 0.3) * 0.5 + 0.5;
        const sp = sPos(0.82 + st * 0.14, ny - 0.02 + sv * 0.05);
        j === 0 ? ctx.moveTo(sp.x, sp.y) : ctx.lineTo(sp.x, sp.y);
      }
    }
    ctx.stroke();
  });
}

// ── Draw a water cooler ────────────────────────────────────────
function drawWaterCooler(gx, gy) {
  const { x, y } = isoToScreen(gx, gy);
  const { s } = getLayout();
  // White base
  ctx.fillStyle = '#cccccc';
  ctx.fillRect(x - 4 * s, y - 18 * s, 8 * s, 18 * s);
  ctx.fillStyle = '#bbbbbb';
  ctx.fillRect(x, y - 18 * s, 4 * s, 18 * s);
  // Blue jug (same width & height as base)
  ctx.fillStyle = '#4488cc';
  ctx.fillRect(x - 4 * s, y - 36 * s, 8 * s, 18 * s);
  ctx.fillStyle = '#5599dd';
  ctx.fillRect(x - 4 * s, y - 36 * s, 4 * s, 18 * s);
  // Cap
  ctx.fillStyle = '#336699';
  ctx.fillRect(x - 3 * s, y - 38 * s, 6 * s, 2 * s);
  // Glare
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(x - 3 * s, y - 34 * s, 2 * s, 14 * s);
  // Animated bubbles
  ctx.fillStyle = 'rgba(200,230,255,0.4)';
  for (let i = 0; i < 4; i++) {
    const speed = 0.6 + i * 0.15;
    const bx = x + (Math.sin(animTime * 1.3 + i * 2.5) * 2.5) * s;
    const phase = ((animTime * speed + i * 0.7) % 1);
    const by = y - 19 * s - phase * 16 * s;
    const r = (1.0 + Math.sin(animTime * 2 + i) * 0.4) * s;
    const alpha = phase < 0.8 ? 0.4 : 0.4 * (1 - (phase - 0.8) / 0.2);
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(bx, by, r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── Draw a Roblox-style character ──────────────────────────────
function drawCharacter(gx, gy, colors, accessory, legPhase, bobY, seated) {
  const { s } = getLayout();
  const { x, y } = isoToScreen(gx, gy);
  const baseY = y + (bobY || 0);

  const headW = 16 * s;
  const headH = 16 * s;
  const bodyW = 18 * s;
  const bodyH = 20 * s;
  const armW = 6 * s;
  const armH = seated ? 14 * s : 18 * s;

  const legSwing = legPhase ? Math.sin(legPhase) * 3 * s : 0;

  // Shadow
  ctx.beginPath();
  ctx.ellipse(x, baseY + 4 * s, 16 * s, 7 * s, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fill();

  let bodyBottom;
  if (seated) {
    // Seated: bent legs visible, no shoes, raised higher so character is clearly visible
    const seatLegH = 8 * s;
    bodyBottom = baseY - seatLegH;
    ctx.fillStyle = shadeColor(colors.legs, -10);
    ctx.fillRect(x - 8 * s, baseY - seatLegH, 7 * s, seatLegH);
    ctx.fillStyle = colors.legs;
    ctx.fillRect(x + 1 * s, baseY - seatLegH, 7 * s, seatLegH);
  } else {
    // Standing: shoes + legs
    const shoeH = 3 * s;
    const legH = 12 * s;
    const shoeTop = baseY - shoeH;
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(x - 8 * s, shoeTop + legSwing, 7 * s, shoeH);
    ctx.fillRect(x + 1 * s, shoeTop - legSwing, 7 * s, shoeH);
    ctx.fillStyle = '#333';
    ctx.fillRect(x - 8 * s, baseY - 1 * s + legSwing, 7 * s, 1 * s);
    ctx.fillRect(x + 1 * s, baseY - 1 * s - legSwing, 7 * s, 1 * s);
    const legTop = shoeTop - legH;
    bodyBottom = legTop;
    ctx.fillStyle = shadeColor(colors.legs, -10);
    ctx.fillRect(x - 8 * s, legTop + legSwing, 7 * s, legH);
    ctx.fillStyle = colors.legs;
    ctx.fillRect(x + 1 * s, legTop - legSwing, 7 * s, legH);
    ctx.fillStyle = shadeColor(colors.legs, -25);
    ctx.fillRect(x - 2 * s, legTop, 1 * s, legH);
  }

  // Body
  const bodyTop = bodyBottom - bodyH;
  ctx.fillStyle = colors.body;
  ctx.fillRect(x - bodyW / 2, bodyTop, bodyW, bodyH);
  ctx.fillStyle = shadeColor(colors.body, 20);
  ctx.fillRect(x + 1 * s, bodyTop, bodyW / 2 - 1 * s, bodyH);
  ctx.fillStyle = shadeColor(colors.body, -20);
  ctx.fillRect(x - 4 * s, bodyTop, 8 * s, 2 * s);
  ctx.fillStyle = '#3a3a4a';
  ctx.fillRect(x - bodyW / 2, bodyTop + bodyH - 3 * s, bodyW, 2 * s);
  ctx.fillStyle = '#d4a830';
  ctx.fillRect(x - 1.5 * s, bodyTop + bodyH - 3 * s, 3 * s, 2 * s);

  // Arms
  ctx.fillStyle = shadeColor(colors.body, -20);
  ctx.fillRect(x - bodyW / 2 - armW, bodyTop + 2 * s, armW, armH);
  ctx.fillStyle = colors.skin;
  ctx.fillRect(x - bodyW / 2 - armW, bodyTop + 2 * s + armH, armW, 3 * s);
  ctx.fillStyle = shadeColor(colors.body, 10);
  ctx.fillRect(x + bodyW / 2, bodyTop + 2 * s, armW, armH);
  ctx.fillStyle = shadeColor(colors.skin, 10);
  ctx.fillRect(x + bodyW / 2, bodyTop + 2 * s + armH, armW, 3 * s);

  // Head
  const headTop = bodyTop - headH;
  ctx.fillStyle = colors.skin;
  ctx.fillRect(x - headW / 2, headTop, headW, headH);
  ctx.fillStyle = shadeColor(colors.skin, 12);
  ctx.fillRect(x, headTop, headW / 2, headH);
  ctx.fillStyle = shadeColor(colors.skin, 25);
  ctx.fillRect(x - headW / 2, headTop, headW, 2 * s);

  // Hair
  if (colors.hair) {
    ctx.fillStyle = colors.hair;
    ctx.fillRect(x - headW / 2, headTop, headW, 5 * s);
    ctx.fillRect(x - headW / 2, headTop, 2 * s, 8 * s);
    ctx.fillRect(x + headW / 2 - 2 * s, headTop, 2 * s, 7 * s);
  }

  // Face
  const sleeping = seated && accessory === 'siren';
  ctx.fillStyle = colors.hair || '#333';
  ctx.fillRect(x - 6 * s, headTop + 5 * s, 4 * s, 1 * s);
  ctx.fillRect(x + 2 * s, headTop + 5 * s, 4 * s, 1 * s);
  if (sleeping) {
    // Closed eyes — horizontal lines
    ctx.fillStyle = colors.hair || '#333';
    ctx.fillRect(x - 6 * s, headTop + 8.5 * s, 4 * s, 1 * s);
    ctx.fillRect(x + 2 * s, headTop + 8.5 * s, 4 * s, 1 * s);
  } else {
    // Open eyes
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x - 6 * s, headTop + 7 * s, 4 * s, 3 * s);
    ctx.fillRect(x + 2 * s, headTop + 7 * s, 4 * s, 3 * s);
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(x - 5 * s, headTop + 8 * s, 2 * s, 2 * s);
    ctx.fillRect(x + 3 * s, headTop + 8 * s, 2 * s, 2 * s);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x - 5 * s, headTop + 8 * s, 1 * s, 1 * s);
    ctx.fillRect(x + 3 * s, headTop + 8 * s, 1 * s, 1 * s);
  }
  ctx.fillStyle = shadeColor(colors.skin, -15);
  ctx.fillRect(x - 0.5 * s, headTop + 10 * s, 1 * s, 2 * s);
  ctx.fillStyle = '#cc8877';
  ctx.fillRect(x - 2 * s, headTop + 13 * s, 4 * s, 1 * s);

  // Hat
  if (colors.hat) {
    ctx.fillStyle = colors.hat;
    ctx.fillRect(x - headW / 2 - 2 * s, headTop - 2 * s, headW + 4 * s, 3 * s);
    ctx.fillRect(x - headW / 2 + 1 * s, headTop - 8 * s, headW - 2 * s, 6 * s);
    ctx.fillStyle = shadeColor(colors.hat, -30);
    ctx.fillRect(x - headW / 2 + 1 * s, headTop - 3 * s, headW - 2 * s, 2 * s);
  }

  // Accessories
  if (accessory === 'newspaper') {
    ctx.fillStyle = '#e8e0d0';
    ctx.fillRect(x + bodyW / 2 + armW - 1 * s, bodyTop + 6 * s, 8 * s, 10 * s);
    ctx.fillStyle = '#bbb';
    for (let i = 0; i < 3; i++)
      ctx.fillRect(x + bodyW / 2 + armW + 0.5 * s, bodyTop + 8 * s + i * 3 * s, 5 * s, 1 * s);
  } else if (accessory === 'clipboard') {
    ctx.fillStyle = '#c9a96e';
    ctx.fillRect(x + bodyW / 2 + armW - 1 * s, bodyTop + 4 * s, 7 * s, 10 * s);
    ctx.fillStyle = '#eee';
    ctx.fillRect(x + bodyW / 2 + armW, bodyTop + 6 * s, 5 * s, 7 * s);
    ctx.fillStyle = '#777';
    ctx.fillRect(x + bodyW / 2 + armW + 2 * s, bodyTop + 3 * s, 2 * s, 2 * s);
  } else if (accessory === 'chart') {
    ctx.fillStyle = '#222';
    ctx.fillRect(x - bodyW / 2 - armW - 7 * s, bodyTop + 4 * s, 8 * s, 12 * s);
    ctx.fillStyle = '#0a1628';
    ctx.fillRect(x - bodyW / 2 - armW - 6 * s, bodyTop + 5 * s, 6 * s, 10 * s);
    ctx.strokeStyle = '#3fb950';
    ctx.lineWidth = 1 * s;
    ctx.beginPath();
    const cx2 = x - bodyW / 2 - armW - 5 * s;
    const cy2 = bodyTop + 12 * s;
    ctx.moveTo(cx2, cy2);
    ctx.lineTo(cx2 + 1 * s, cy2 - 2 * s);
    ctx.lineTo(cx2 + 2 * s, cy2 - 1 * s);
    ctx.lineTo(cx2 + 3 * s, cy2 - 4 * s);
    ctx.lineTo(cx2 + 4 * s, cy2 - 3 * s);
    ctx.stroke();
  } else if (accessory === 'horns') {
    ctx.fillStyle = '#cc2222';
    ctx.fillRect(x - headW / 2 - 1 * s, headTop - 6 * s, 3 * s, 5 * s);
    ctx.fillRect(x + headW / 2 - 2 * s, headTop - 6 * s, 3 * s, 5 * s);
    ctx.fillRect(x - headW / 2 - 2 * s, headTop - 8 * s, 2 * s, 3 * s);
    ctx.fillRect(x + headW / 2, headTop - 8 * s, 2 * s, 3 * s);
  } else if (accessory === 'shield') {
    ctx.fillStyle = '#d29922';
    ctx.fillRect(x - bodyW / 2 - armW - 5 * s, bodyTop + 4 * s, 6 * s, 10 * s);
    ctx.fillStyle = '#e8b830';
    ctx.fillRect(x - bodyW / 2 - armW - 4 * s, bodyTop + 5 * s, 4 * s, 8 * s);
    ctx.fillStyle = '#d29922';
    ctx.fillRect(x - bodyW / 2 - armW - 3 * s, bodyTop + 7 * s, 2 * s, 4 * s);
  } else if (accessory === 'bolt') {
    ctx.fillStyle = '#f0883e';
    ctx.fillRect(x + 1 * s, headTop - 12 * s, 4 * s, 3 * s);
    ctx.fillRect(x - 1 * s, headTop - 10 * s, 4 * s, 3 * s);
    ctx.fillRect(x + 1 * s, headTop - 8 * s, 4 * s, 3 * s);
  } else if (accessory === 'book') {
    ctx.fillStyle = '#39d2c0';
    ctx.fillRect(x + bodyW / 2 + armW - 1 * s, bodyTop + 5 * s, 6 * s, 8 * s);
    ctx.fillStyle = '#eee';
    ctx.fillRect(x + bodyW / 2 + armW, bodyTop + 6 * s, 4 * s, 6 * s);
    ctx.fillStyle = '#333';
    ctx.fillRect(x + bodyW / 2 + armW + 5 * s, bodyTop + 4 * s, 1 * s, 10 * s);
    ctx.fillStyle = '#58a6ff';
    ctx.fillRect(x + bodyW / 2 + armW + 5 * s, bodyTop + 4 * s, 1 * s, 2 * s);
  } else if (accessory === 'glasses') {
    ctx.strokeStyle = '#d4a830';
    ctx.lineWidth = 1 * s;
    ctx.strokeRect(x - 6 * s, headTop + 6.5 * s, 5 * s, 4 * s);
    ctx.strokeRect(x + 1 * s, headTop + 6.5 * s, 5 * s, 4 * s);
    ctx.beginPath();
    ctx.moveTo(x - 1 * s, headTop + 8 * s);
    ctx.lineTo(x + 1 * s, headTop + 8 * s);
    ctx.stroke();
  } else if (accessory === 'siren' && (!seated || liveData.portfolio?.halted)) {
    // Active siren — when walking/interacting OR system is halted
    const pr = (5 + Math.sin(animTime * 3) * 1.5) * s;
    const ga = 0.15 + Math.sin(animTime * 3) * 0.08;
    ctx.fillStyle = `rgba(255,50,50,${ga})`;
    ctx.beginPath();
    ctx.arc(x, headTop - 8 * s, pr * 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff3333';
    ctx.beginPath();
    ctx.arc(x, headTop - 8 * s, pr, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff8888';
    ctx.beginPath();
    ctx.arc(x - 1 * s, headTop - 9 * s, 2 * s, 0, Math.PI * 2);
    ctx.fill();
  } else if (accessory === 'siren' && seated && !liveData.portfolio?.halted) {
    // Sleeping Zs — idle Circuit Breaker (only when system is NOT halted)
    const zFont = Math.max(6, Math.round(8.8 * s));
    ctx.font = `bold ${zFont}px "SF Mono", "Courier New", monospace`;
    ctx.fillStyle = 'rgba(140,180,255,0.7)';
    for (let i = 0; i < 3; i++) {
      const zt = animTime * 0.8 + i * 1.5;
      const cycle = (zt % 3) / 3;
      const zx = x + (6 + i * 5) * s + Math.sin(zt) * 2 * s;
      const zy = headTop - (8 + cycle * 20) * s;
      const za = 1.0 - cycle;
      const zSize = zFont * (0.6 + i * 0.25);
      ctx.globalAlpha = za * 0.8;
      ctx.font = `bold ${Math.round(zSize)}px "SF Mono", "Courier New", monospace`;
      ctx.fillText('Z', zx, zy);
    }
    ctx.globalAlpha = 1.0;
  }

  return { x, baseY };
}

// ── Draw speech bubble dots ────────────────────────────────────
function drawSpeechBubble(screenX, screenY) {
  const { s } = getLayout();
  const bx = screenX;
  const by = screenY - 60 * s;

  // Bubble background
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath();
  ctx.arc(bx, by, 8 * s, 0, Math.PI * 2);
  ctx.fill();

  // Animated dots
  ctx.fillStyle = '#333';
  for (let i = 0; i < 3; i++) {
    const dotY = by + Math.sin(animTime * 4 + i * 1.2) * 1.5 * s;
    ctx.beginPath();
    ctx.arc(bx - 3 * s + i * 3 * s, dotY, 1 * s, 0, Math.PI * 2);
    ctx.fill();
  }

  // Bubble tail
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath();
  ctx.arc(bx + 2 * s, by + 7 * s, 2.5 * s, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(bx + 3 * s, by + 11 * s, 1.5 * s, 0, Math.PI * 2);
  ctx.fill();
}

// ── Draw glass partition (office walls) ────────────────────────
function drawGlassPartition(fromGx, fromGy, toGx, toGy) {
  const from = isoToScreen(fromGx, fromGy);
  const to = isoToScreen(toGx, toGy);
  const { s } = getLayout();
  const wallH = 28 * s;

  // Glass fill
  ctx.fillStyle = 'rgba(140, 200, 250, 0.08)';
  ctx.beginPath();
  ctx.moveTo(from.x, from.y);
  ctx.lineTo(from.x, from.y - wallH);
  ctx.lineTo(to.x, to.y - wallH);
  ctx.lineTo(to.x, to.y);
  ctx.closePath();
  ctx.fill();

  // Frame
  ctx.strokeStyle = 'rgba(140, 200, 250, 0.35)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(from.x, from.y);
  ctx.lineTo(from.x, from.y - wallH);
  ctx.lineTo(to.x, to.y - wallH);
  ctx.lineTo(to.x, to.y);
  ctx.closePath();
  ctx.stroke();

  // Reflection highlight
  ctx.strokeStyle = 'rgba(200, 230, 255, 0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(from.x, from.y - wallH * 0.3);
  ctx.lineTo(to.x, to.y - wallH * 0.3);
  ctx.stroke();
}

// ── Walking system ─────────────────────────────────────────────
// Door positions (in gap of front glass wall at gy=5)
const STRAT_DOOR_GX = 3.5;    // left edge of gap gx 3.5–5 (avoids desk at 4.5)
const CIRCUIT_DOOR_GX = 12;   // right edge of gap gx 10.5–12
const WALL_GY = 5;            // glass front wall
const DIVIDER_GX = 8;         // center divider

// Desk positions that agents must avoid when walking vertically
const DESK_OBSTACLES = [
  { gx: 3, gy: 7 }, { gx: 4, gy: 7 },   // NewsScout
  { gx: 6, gy: 7 }, { gx: 7, gy: 7 },   // Analyst
  { gx: 9, gy: 7 }, { gx: 10, gy: 7 },  // Chart
  { gx: 12, gy: 7 }, { gx: 13, gy: 7 }, // Devil
  { gx: 2, gy: 13 },   // Trader1
  { gx: 5, gy: 13 },   // Trader2
  { gx: 8, gy: 13 },   // Trader3
  { gx: 11, gy: 10 },  // Trader4
  { gx: 2, gy: 10 }, { gx: 5, gy: 10 }, { gx: 8, gy: 10 },
];
const SAFE_DIST = 0.8;
// Vertical corridors that are ≥0.8 tiles from all desk centers
const CORRIDORS = [2, 5, 8, 11, 14];

function verticalHitsDesk(gx, fromGy, toGy) {
  const minGy = Math.min(fromGy, toGy);
  const maxGy = Math.max(fromGy, toGy);
  return DESK_OBSTACLES.some(d =>
    d.gy > minGy && d.gy < maxGy && Math.abs(gx - d.gx) < SAFE_DIST
  );
}

function nearestCorridor(gx, fromGy, toGy) {
  // Pick closest corridor that is actually clear for this gy range
  const sorted = [...CORRIDORS].sort((a, b) => Math.abs(a - gx) - Math.abs(b - gx));
  for (const c of sorted) {
    if (!verticalHitsDesk(c, fromGy, toGy)) return c;
  }
  // All corridors blocked — pick midpoint between two nearest desks as fallback
  return sorted[0] + 0.5;
}

function calcWalkPath(fromGx, fromGy, toGx, toGy) {
  const path = [{ gx: fromGx, gy: fromGy }];

  const fromInOffice = fromGy < WALL_GY;
  const toInOffice = toGy < WALL_GY;

  if (fromInOffice !== toInOffice) {
    // Must cross glass wall — route through door
    const insideGx = fromInOffice ? fromGx : toGx;
    const doorGx = (insideGx < DIVIDER_GX) ? STRAT_DOOR_GX : CIRCUIT_DOOR_GX;

    if (Math.abs(fromGx - doorGx) > 0.1) path.push({ gx: doorGx, gy: fromGy });
    path.push({ gx: doorGx, gy: toGy });
    if (Math.abs(toGx - doorGx) > 0.1) path.push({ gx: toGx, gy: toGy });

  } else if (fromInOffice && toInOffice &&
             (fromGx < DIVIDER_GX) !== (toGx < DIVIDER_GX)) {
    // Both in offices but different sides — route through doors
    const fromDoor = (fromGx < DIVIDER_GX) ? STRAT_DOOR_GX : CIRCUIT_DOOR_GX;
    const toDoor = (toGx < DIVIDER_GX) ? STRAT_DOOR_GX : CIRCUIT_DOOR_GX;
    path.push({ gx: fromDoor, gy: fromGy });
    path.push({ gx: fromDoor, gy: WALL_GY + 0.5 });
    path.push({ gx: toDoor, gy: WALL_GY + 0.5 });
    path.push({ gx: toDoor, gy: toGy });
    if (Math.abs(toGx - toDoor) > 0.1) path.push({ gx: toGx, gy: toGy });

  } else if (fromGy !== toGy && verticalHitsDesk(toGx, fromGy, toGy)) {
    // Vertical segment would cross a desk — route through safe corridor
    const corridor = nearestCorridor(toGx, fromGy, toGy);
    if (Math.abs(fromGx - corridor) > 0.1) path.push({ gx: corridor, gy: fromGy });
    path.push({ gx: corridor, gy: toGy });
    if (Math.abs(corridor - toGx) > 0.1) path.push({ gx: toGx, gy: toGy });

  } else {
    // Clear path — simple L-shape
    if (fromGx !== toGx) path.push({ gx: toGx, gy: fromGy });
    if (fromGy !== toGy) path.push({ gx: toGx, gy: toGy });
  }

  return path;
}

function sendAgentTo(agentName, targetGx, targetGy, pauseDuration) {
  const agent = agents.find(a => a.name === agentName);
  if (!agent || agent.npc || agent.state !== 'idle') return false;
  agent.state = 'walking';
  agent.walkPath = calcWalkPath(agent.renderGx, agent.renderGy, targetGx, targetGy);
  agent.walkIndex = 0;
  agent.walkProgress = 0;
  agent.interactTimer = pauseDuration || 1.2;
  return true;
}

function updateAgentWalk(agent, dt) {
  if (agent.state === 'idle') {
    agent.idleBob = Math.sin(animTime * 2.5 + agent.homeGx * 1.3 + agent.homeGy * 0.7) * 0.8;
    agent.legPhase = 0;
    return;
  }

  if (agent.state === 'interacting') {
    agent.idleBob = 0;
    agent.legPhase = 0;
    agent.interactTimer -= dt;
    if (agent.interactTimer <= 0) {
      agent.state = 'walking_back';
      agent.walkPath = calcWalkPath(agent.renderGx, agent.renderGy, agent.homeGx, agent.homeGy);
      agent.walkIndex = 0;
      agent.walkProgress = 0;
    }
    return;
  }

  // walking or walking_back
  agent.idleBob = 0;
  if (agent.walkIndex >= agent.walkPath.length - 1) {
    if (agent.state === 'walking') {
      agent.state = 'interacting';
    } else {
      agent.state = 'idle';
      agent.renderGx = agent.homeGx;
      agent.renderGy = agent.homeGy;
      agent.walkSpeed = 3.0; // reset from rush speed
    }
    agent.legPhase = 0;
    return;
  }

  const from = agent.walkPath[agent.walkIndex];
  const to = agent.walkPath[agent.walkIndex + 1];
  const segLen = Math.abs(to.gx - from.gx) + Math.abs(to.gy - from.gy);
  const speed = agent.walkSpeed / Math.max(segLen, 0.01);

  agent.walkProgress += speed * dt;
  agent.legPhase += dt * 10;

  if (agent.walkProgress >= 1) {
    agent.walkProgress = 0;
    agent.walkIndex++;
    if (agent.walkIndex >= agent.walkPath.length - 1) {
      // Snap to destination
      const dest = agent.walkPath[agent.walkPath.length - 1];
      agent.renderGx = dest.gx;
      agent.renderGy = dest.gy;
    }
  } else {
    const t = agent.walkProgress;
    agent.renderGx = from.gx + (to.gx - from.gx) * t;
    agent.renderGy = from.gy + (to.gy - from.gy) * t;
  }
}

function updateAgents(dt) {
  agents.forEach(a => updateAgentWalk(a, dt));
}

// ── Pantry gossip system ────────────────────────────────────────
const PANTRY_SPOTS = [
  { gx: 10,   gy: 13 },
  { gx: 12.5, gy: 13 },
  { gx: 14,   gy: 13 },
];
const PANTRY_AGENTS = ['Risk', 'Executor', 'Journal'];

function recallFromPantry(agentName) {
  const agent = agents.find(a => a.name === agentName);
  if (!agent || !agent.pantryTrip) return false;
  if (agent.state === 'idle' &&
      Math.abs(agent.renderGx - agent.homeGx) < 0.2 &&
      Math.abs(agent.renderGy - agent.homeGy) < 0.2) return false;
  // Rush back!
  agent.state = 'walking_back';
  agent.walkPath = calcWalkPath(agent.renderGx, agent.renderGy, agent.homeGx, agent.homeGy);
  agent.walkIndex = 0;
  agent.walkProgress = 0;
  agent.walkSpeed = 5.5;  // rush speed
  agent.interactTimer = 0;
  return true;
}

function updatePantryVisits(dt) {
  for (const name of PANTRY_AGENTS) {
    const agent = agents.find(a => a.name === name);
    if (!agent) continue;

    // When back at desk after pantry trip, clear flag
    if (agent.pantryTrip && agent.state === 'idle') {
      if (Math.abs(agent.renderGx - agent.homeGx) < 0.2 &&
          Math.abs(agent.renderGy - agent.homeGy) < 0.2) {
        agent.pantryTrip = false;
        agent.idleTimer = 0;
        agent.walkSpeed = 3.0;
      }
    }

    // Only consider pantry when truly idle at home desk
    if (agent.state !== 'idle' || agent.pantryTrip) continue;

    agent.idleTimer += dt;
    const threshold = 6 + Math.abs(Math.sin(agent.homeGx * 2.7)) * 10;
    if (agent.idleTimer > threshold && Math.random() < 0.008) {
      const spot = PANTRY_SPOTS[Math.floor(Math.random() * PANTRY_SPOTS.length)];
      if (sendAgentTo(name, spot.gx, spot.gy, 2.0 + Math.random() * 2.5)) {
        agent.pantryTrip = true;
      }
    }
  }
}

// ── Demo sequence ──────────────────────────────────────────────
const DEMO_STEPS = [
  { agent: 'NewsScout', target: 'Analyst',    pause: 1.5, label: 'Delivering news briefing' },
  { agent: 'Analyst',   target: 'Chart',      pause: 1.8, label: 'Checking technicals' },
  { agent: 'Analyst',   target: 'Devil',      pause: 2.0, label: "Devil's advocate review" },
  { agent: 'Analyst',   target: 'Risk',       pause: 1.5, label: 'Requesting risk check' },
  { agent: 'Risk',      target: 'Executor',   pause: 1.0, label: 'Approving trade' },
  { agent: 'Executor',  target: 'Journal',    pause: 1.2, label: 'Logging trade' },
  { wait: 4.0 },
  { agent: 'Analyst',   target: 'Strategist', pause: 2.0, label: 'Strategy consultation' },
  { wait: 3.0 },
];

const demo = {
  stepIndex: 0,
  phase: 'ready',   // ready | active | waiting
  waitTimer: 0,
  label: '',
  labelAgent: null,
};

function updateDemo(dt) {
  const step = DEMO_STEPS[demo.stepIndex];

  if (demo.phase === 'ready') {
    if (step.wait) {
      demo.phase = 'waiting';
      demo.waitTimer = step.wait;
      demo.label = '';
      demo.labelAgent = null;
    } else {
      // Recall agents from pantry if needed for this step
      const walker = agents.find(a => a.name === step.agent);
      if (walker && walker.pantryTrip && walker.state !== 'idle') {
        recallFromPantry(step.agent);
        return; // wait for them to rush back
      }
      const target = agents.find(a => a.name === step.target);
      if (target && sendAgentTo(step.agent, target.homeGx, target.homeGy, step.pause)) {
        demo.phase = 'active';
        demo.label = step.label || '';
        demo.labelAgent = step.agent;
      }
    }
  }

  if (demo.phase === 'active') {
    const agent = agents.find(a => a.name === step.agent);
    if (agent && agent.state === 'idle') {
      demo.phase = 'ready';
      demo.label = '';
      demo.labelAgent = null;
      demo.stepIndex = (demo.stepIndex + 1) % DEMO_STEPS.length;
    }
  }

  if (demo.phase === 'waiting') {
    demo.waitTimer -= dt;
    if (demo.waitTimer <= 0) {
      demo.phase = 'ready';
      demo.stepIndex = (demo.stepIndex + 1) % DEMO_STEPS.length;
    }
  }
}

    const foodX = x + 10 * s;
    ctx.fillStyle = '#d4a44a';
    ctx.fillRect(foodX - 3 * s, foodY - 2 * s, 6 * s, 4 * s);
    ctx.fillStyle = '#8b4513';
    ctx.fillRect(foodX - 3 * s, foodY - 0.5 * s, 6 * s, 1.5 * s);
    ctx.fillStyle = '#c8a040';
    ctx.fillRect(foodX - 3.5 * s, foodY - 3 * s, 7 * s, 2 * s);
    // Crumbs falling
    if (eatCycle > 0.3 && eatCycle < 0.7) {
      ctx.fillStyle = 'rgba(200,160,60,0.5)';
      for (let i = 0; i < 3; i++) {
        const cx = foodX + (Math.sin(animTime * 4 + i * 2.1) * 4) * s;
        const cy = foodY + 4 * s + ((animTime * 30 + i * 11) % 12) * s;
        ctx.fillRect(cx, cy, 1.2 * s, 1.2 * s);
      }
    }
  }

  if (agent.name === 'Trader2') {
    // Panicking — sweat drops + panic lines
    ctx.fillStyle = 'rgba(100,180,255,0.6)';
    for (let i = 0; i < 3; i++) {
      const dropPhase = ((animTime * 2 + i * 0.8) % 1);
      const dx = x + (i - 1) * 8 * s;
      const dy = baseY - 65 * s + dropPhase * 20 * s;
      const dropSize = (1 - dropPhase) * 2 * s;
      ctx.beginPath();
      ctx.arc(dx, dy, dropSize, 0, Math.PI * 2);
      ctx.fill();
    }
    // Panic lines above head
    ctx.strokeStyle = 'rgba(255,100,100,0.5)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 2; i++) {
      const lx = x + (i === 0 ? -8 : 8) * s;
      const ly = baseY - 72 * s + Math.sin(animTime * 6 + i) * 3 * s;
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(lx + (i === 0 ? -4 : 4) * s, ly - 5 * s);
      ctx.stroke();
    }
  }

  if (agent.name === 'Trader3') {
    // Smoking — cigarette + smoke wisps
    const mouthX = x + 9 * s;
    const mouthY = baseY - 48 * s;
    ctx.fillStyle = '#e8e0d0';
    ctx.fillRect(mouthX, mouthY - 1 * s, 8 * s, 2 * s);
    ctx.fillStyle = '#ff6633';
    ctx.fillRect(mouthX + 7 * s, mouthY - 1.2 * s, 2 * s, 2.4 * s);
    const glowR = (1 + Math.sin(animTime * 3) * 0.3);
    ctx.fillStyle = `rgba(255,100,30,${0.15 * glowR})`;
    ctx.beginPath();
    ctx.arc(mouthX + 8 * s, mouthY, 3 * s * glowR, 0, Math.PI * 2);
    ctx.fill();
    // Smoke wisps
    for (let i = 0; i < 5; i++) {
      const t = ((animTime * 0.4 + i * 0.35) % 1);
      const sx = mouthX + 8 * s + Math.sin(animTime * 0.8 + i * 1.7) * 6 * s * t;
      const sy = mouthY - t * 25 * s;
      const sr = (1.5 + t * 4) * s;
      ctx.globalAlpha = (1 - t) * 0.25;
      ctx.fillStyle = 'rgba(180,180,190,0.9)';
      ctx.beginPath();
      ctx.arc(sx, sy, sr, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

// ── Draw everything ────────────────────────────────────────────
function draw() {
  const layout = getLayout();
  const { W, H, s, titleSpace } = layout;

  // Background
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a2030');
  grad.addColorStop(0.5, '#1e2538');
  grad.addColorStop(1, '#1a2030');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Title
  const titleSize = Math.max(13, Math.round(19.8 * s));
  ctx.fillStyle = '#8b949e';
  ctx.font = `bold ${titleSize}px "SF Mono", "Courier New", monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('AGENT TRADING FLOOR', W / 2, titleSpace * 0.55);
  const subSize = Math.max(8, Math.round(11 * s));
  ctx.fillStyle = '#484f58';
  ctx.font = `${subSize}px "SF Mono", "Courier New", monospace`;
  ctx.fillText('9 agents  ·  autonomous trading system', W / 2, titleSpace * 0.55 + titleSize + 4);

  // Connection status indicator (top-right)
  const statusFs = Math.max(7, Math.round(9 * s));
  ctx.font = `${statusFs}px "SF Mono", "Courier New", monospace`;
  ctx.textAlign = 'right';
  if (liveData.connected || liveData.wsConnected) {
    const dotPulse = 0.5 + Math.sin(animTime * 3) * 0.3;
    ctx.fillStyle = `rgba(63,185,80,${dotPulse})`;
    ctx.beginPath();
    ctx.arc(W - 14, titleSpace * 0.35, 3.5 * s, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#3fb950';
    ctx.fillText(liveMode ? 'LIVE' : 'CONNECTED', W - 22, titleSpace * 0.40);
  } else {
    ctx.fillStyle = '#484f58';
    ctx.fillText('DEMO', W - 14, titleSpace * 0.40);
  }
  ctx.textAlign = 'left';

  // Floor tiles (brighter) + executive office carpet
  for (let gx = 0; gx < GRID_SIZE; gx++) {
    for (let gy = 0; gy < GRID_SIZE; gy++) {
      const isLight = (gx + gy) % 2 === 0;
      const inExecOffice = gy <= 4;
      if (inExecOffice) {
        drawTile(gx, gy, isLight ? '#3d4560' : '#354058', '#4a5570');
      } else {
        drawTile(gx, gy, isLight ? '#384a62' : '#30405a', '#4a5a72');
      }
    }
  }

  // Walls (brighter)
  const topLeft = isoToScreen(0, 0);
  const backLeft = isoToScreen(0, GRID_SIZE - 1);
  const backRight = isoToScreen(GRID_SIZE - 1, 0);
  const wallH = 45 * s;

  ctx.fillStyle = '#2a3548';
  ctx.beginPath();
  ctx.moveTo(topLeft.x, topLeft.y);
  ctx.lineTo(topLeft.x, topLeft.y - wallH);
  ctx.lineTo(backLeft.x, backLeft.y - wallH);
  ctx.lineTo(backLeft.x, backLeft.y);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#4a5a72';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.fillStyle = '#2e3a4e';
  ctx.beginPath();
  ctx.moveTo(topLeft.x, topLeft.y);
  ctx.lineTo(topLeft.x, topLeft.y - wallH);
  ctx.lineTo(backRight.x, backRight.y - wallH);
  ctx.lineTo(backRight.x, backRight.y);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#4a5a72';
  ctx.stroke();

  // Massive wall display (right wall, top-left to mid-top)
  drawWallDisplay();

  // Ticker board (left wall, Strat's office)
  drawTickerBoard();

  // Scheduler countdown clocks (left wall, below ticker)
  drawSchedulerClocks();

  // ── Glass partitions (executive offices: 8x5 each, shared divider) ──
  // Strategist front wall with door gap at gx 3.5–5
  drawGlassPartition(0, 5, 3.5, 5);
  drawGlassPartition(5, 5, 8, 5);
  // Circuit front wall with door gap at gx 10.5–12
  drawGlassPartition(8, 5, 10.5, 5);
  drawGlassPartition(12, 5, 15, 5);
  // Center divider (shared wall at gx=8)
  drawGlassPartition(8, 0, 8, 5);

  // ── Zone labels ──
  const zoneFontSize = Math.max(7, Math.round(8.8 * s));
  ctx.font = `${zoneFontSize}px "SF Mono", "Courier New", monospace`;
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(139,148,158,0.4)';
  const execPos = isoToScreen(7.5, 0.5);
  ctx.fillText('EXECUTIVE', execPos.x, execPos.y);
  const analPos = isoToScreen(7, 6.3);
  ctx.fillText('ANALYST BULLPEN', analPos.x, analPos.y);
  const opsPos = isoToScreen(7, 9.5);
  ctx.fillText('OPS FLOOR', opsPos.x, opsPos.y);

  // ── Furniture ──
  const deskH = 14 * s;

  // All desks + monitors drawn after agents (post-agent pass)

  // Chairs
  drawExecChair(4, 1.5);  // Strategist
  drawExecChair(11, 1.5); // Circuit
  drawChair(3, 6.5);   // NewsScout
  drawChair(6, 6.5);   // Analyst
  drawChair(9, 6.5);   // Chart
  drawChair(12, 6.5);  // Devil
  drawChair(2, 12.5);  // Trader1
  drawChair(5, 12.5);  // Trader2
  drawChair(8, 12.5);  // Trader3
  drawChair(11, 9.5);  // Trader4
  drawChair(2, 9.5);   // Risk
  drawChair(5, 9.5);   // Executor
  drawChair(8, 9.5);   // Journal

  // ── Pantry (4 joined tables along bottom wall at gy=14) ──
  drawCube(11, 14, 1, deskH, 1, '#6a5a48');
  drawCube(12, 14, 1, deskH, 1, '#6a5a48');
  drawCube(13, 14, 1, deskH, 1, '#6a5a48');
  drawCube(14, 14, 1, deskH, 1, '#6a5a48');
  // Water cooler
  drawWaterCooler(15, 14);

  // Coffee machine at (11.5, 14.5)
  const cmPos = isoToScreen(11.5, 14.5);
  ctx.fillStyle = '#3a3030';
  ctx.fillRect(cmPos.x - 4 * s, cmPos.y - deskH - 12 * s, 8 * s, 12 * s);
  ctx.fillStyle = '#2a2020';
  ctx.fillRect(cmPos.x - 3 * s, cmPos.y - deskH - 6 * s, 6 * s, 4 * s);
  ctx.fillStyle = '#e83030';
  ctx.fillRect(cmPos.x + 2 * s, cmPos.y - deskH - 11 * s, 2 * s, 2 * s);
  // Tiny coffee cup next to machine (slightly off-center = messy)
  ctx.fillStyle = '#ddd';
  ctx.fillRect(cmPos.x + 5 * s, cmPos.y - deskH - 4 * s, 3 * s, 4 * s);
  ctx.fillStyle = '#5a3a20';
  ctx.fillRect(cmPos.x + 5.5 * s, cmPos.y - deskH - 3.5 * s, 2 * s, 2 * s);

  // Snack box at (12.5, 14.5) — open, tilted
  const snkPos = isoToScreen(12.5, 14.5);
  ctx.fillStyle = '#d4a040';
  ctx.fillRect(snkPos.x - 4 * s, snkPos.y - deskH - 6 * s, 7 * s, 6 * s);
  ctx.fillStyle = '#c08830';
  ctx.fillRect(snkPos.x - 3 * s, snkPos.y - deskH - 5 * s, 5 * s, 3 * s);
  // Crumbs scattered
  ctx.fillStyle = '#c09030';
  ctx.fillRect(snkPos.x + 5 * s, snkPos.y - deskH - 2 * s, 2 * s, 1.5 * s);
  ctx.fillRect(snkPos.x - 6 * s, snkPos.y - deskH - 1 * s, 1.5 * s, 1.5 * s);
  ctx.fillRect(snkPos.x + 3 * s, snkPos.y - deskH - 0.5 * s, 1 * s, 1 * s);

  // Soda can at (13.5, 14.5) — slightly off-center
  const sodaPos = isoToScreen(13.5, 14.5);
  ctx.fillStyle = '#2266cc';
  ctx.fillRect(sodaPos.x + 1 * s, sodaPos.y - deskH - 8 * s, 4 * s, 8 * s);
  ctx.fillStyle = '#aabbcc';
  ctx.fillRect(sodaPos.x + 1.5 * s, sodaPos.y - deskH - 8.5 * s, 3 * s, 1.5 * s);
  // Another cup — used, left behind
  ctx.fillStyle = '#ccc';
  ctx.fillRect(sodaPos.x - 5 * s, sodaPos.y - deskH - 4 * s, 3 * s, 4 * s);
  ctx.fillStyle = '#4a3020';
  ctx.fillRect(sodaPos.x - 4.5 * s, sodaPos.y - deskH - 3.5 * s, 2 * s, 1.5 * s);

  // Napkins scattered on (14.5, 14.5)
  const napPos = isoToScreen(14.5, 14.5);
  ctx.fillStyle = '#e8e4dc';
  ctx.fillRect(napPos.x - 3 * s, napPos.y - deskH - 3 * s, 5 * s, 3 * s);
  ctx.fillStyle = '#ddd8d0';
  ctx.fillRect(napPos.x + 2 * s, napPos.y - deskH - 4 * s, 4 * s, 2.5 * s);
  ctx.fillRect(napPos.x - 5 * s, napPos.y - deskH - 1 * s, 3 * s, 2 * s);
  // Pantry label
  const pantryLbl = isoToScreen(12.5, 13.5);
  ctx.fillStyle = 'rgba(139,148,158,0.35)';
  ctx.font = `${zoneFontSize}px "SF Mono", "Courier New", monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('PANTRY', pantryLbl.x, pantryLbl.y - 2 * s);

  // ── Depth-sorted rendering: agents + desks interleaved ──
  // Higher gx+gy = closer to camera = drawn later (on top)
  const bubbleQueue = [];
  const drawList = [];
  const npFs = Math.min(10, Math.max(5, Math.round(7.7 * s)));

  // Nameplate helper (draws on desk surface)
  function drawNP(name, gx, gy) {
    ctx.font = `bold ${npFs}px "SF Mono", "Courier New", monospace`;
    ctx.textAlign = 'center';
    const p = isoToScreen(gx, gy);
    const tw = ctx.measureText(name).width;
    ctx.fillStyle = 'rgba(30,36,48,0.7)';
    ctx.fillRect(p.x - tw / 2 - 2, p.y - deskH - npFs + 1, tw + 4, npFs + 2);
    ctx.fillStyle = '#8a9aaa';
    ctx.fillText(name, p.x, p.y - deskH);
  }

  // -- Desk groups (each with cubes + monitors + nameplate) --
  drawList.push({ depth: 4 + 2, fn() {
    drawCube(3,2,1,deskH,1,'#7a6050'); drawCube(4,2,1,deskH,1,'#7a6050'); drawCube(5,2,1,deskH,1,'#7a6050');
    drawLargeMonitor(3.5,2.5,'#1a3848'); drawLargeMonitor(4.5,2.5,'#1a3848');
    drawNP('Strategist', 4.5, 2.5);
  }});
  drawList.push({ depth: 11 + 2, fn() {
    drawCube(10,2,1,deskH,1,'#7a6050'); drawCube(11,2,1,deskH,1,'#7a6050'); drawCube(12,2,1,deskH,1,'#7a6050');
    drawLargeMonitor(10.5,2.5,'#481a28'); drawLargeMonitor(11.5,2.5,'#481a28');
    drawNP('Circuit', 11.5, 2.5);
  }});
  drawList.push({ depth: 3.5 + 7, fn() {
    drawCube(3,7,1,deskH,1,'#8a7560'); drawCube(4,7,1,deskH,1,'#8a7560');
    drawMonitor(3.5,7.5,'#1a4838'); drawNP('NewsScout', 3.5, 7.5);
  }});
  drawList.push({ depth: 6.5 + 7, fn() {
    drawCube(6,7,1,deskH,1,'#8a7560'); drawCube(7,7,1,deskH,1,'#8a7560');
    drawMonitor(6.5,7.5,'#1a3848'); drawNP('Analyst', 6.5, 7.5);
  }});
  drawList.push({ depth: 9.5 + 7, fn() {
    drawCube(9,7,1,deskH,1,'#8a7560'); drawCube(10,7,1,deskH,1,'#8a7560');
    drawMonitor(9.5,7.5,'#3a1a48'); drawNP('Chart', 9.5, 7.5);
  }});
  drawList.push({ depth: 12.5 + 7, fn() {
    drawCube(12,7,1,deskH,1,'#8a7560'); drawCube(13,7,1,deskH,1,'#8a7560');
    drawMonitor(12.5,7.5,'#481a1a'); drawNP('Devil', 12.5, 7.5);
  }});
  drawList.push({ depth: 2 + 10, fn() {
    drawCube(2,10,1,deskH,1,'#7a6a50'); drawMonitor(2.5,10.5,'#48401a');
    drawNP('Risk', 2.5, 10.5);
  }});
  drawList.push({ depth: 5 + 10, fn() {
    drawCube(5,10,1,deskH,1,'#7a6a50'); drawMonitor(5.5,10.5,'#48381a');
    drawNP('Executor', 5.5, 10.5);
  }});
  drawList.push({ depth: 8 + 10, fn() {
    drawCube(8,10,1,deskH,1,'#7a6a50'); drawMonitor(8.5,10.5,'#1a4842');
    drawNP('Journal', 8.5, 10.5);
  }});
  drawList.push({ depth: 2 + 13, fn() {
    drawCube(2,13,1,deskH,1,'#7a6a55'); drawMonitor(2.5,13.5,'#2a3828');
    drawNP('Intern', 2.5, 13.5);
  }});
  drawList.push({ depth: 5 + 13, fn() {
    drawCube(5,13,1,deskH,1,'#7a6a55'); drawMonitor(5.5,13.5,'#28382a');
    drawNP('Intern', 5.5, 13.5);
  }});
  drawList.push({ depth: 8 + 13, fn() {
    drawCube(8,13,1,deskH,1,'#7a6a55'); drawMonitor(8.5,13.5,'#382a28');
    drawNP('Intern', 8.5, 13.5);
  }});
  drawList.push({ depth: 11 + 10, fn() {
    drawCube(11,10,1,deskH,1,'#7a6a55'); drawMonitor(11.5,10.5,'#28283a');
    drawNP('Intern', 11.5, 10.5);
  }});

  // -- Agents --
  for (const agent of agents) {
    let drawGx = agent.renderGx;
    let drawGy = agent.renderGy;
    let isSeated = agent.state === 'idle';
    let legP = agent.legPhase;
    let bob = agent.idleBob;
    let depthBias = 0;

    // Trader4: adjust position when on table
    if (agent.name === 'Trader4') {
      if (agent.npcState === 'dancing') {
        isSeated = false;
        drawGy = agent.homeGy + 0.5;
        legP = agent.dancePhase;
        bob = Math.sin(agent.dancePhase * 2) * 2;
        depthBias = 0.1;
      } else if (agent.npcState === 'climbing' || agent.npcState === 'descending') {
        isSeated = false;
        const progress = agent.npcState === 'climbing' ? 1 - (agent.npcTimer / 0.6) : agent.npcTimer / 0.6;
        drawGy = agent.homeGy + progress * 0.5;
        depthBias = 0.1;
      }
    }
    // Circuit: stand up when system is halted (active siren)
    if (agent.name === 'Circuit' && liveData.portfolio?.halted) {
      isSeated = false;
      bob = Math.sin(animTime * 2) * 1.5; // tense pacing bob
    }
    // Trader2: shake
    if (agent.name === 'Trader2') drawGx += Math.sin(animTime * 20) * 0.05;

    // Capture values for closure
    const _gx = drawGx, _gy = drawGy, _a = agent;
    const _seated = isSeated, _leg = legP, _bob = bob;

    drawList.push({ depth: drawGx + drawGy + depthBias, fn() {
      const pos = drawCharacter(_gx, _gy, _a.colors, _a.accessory, _leg, _bob, _seated);
      if (_a.npc) drawNPCEffect(_a, pos);
      if (_a.state === 'interacting') bubbleQueue.push({ x: pos.x, y: pos.baseY });
    }});
  }

  // Sort back-to-front and draw all
  drawList.sort((a, b) => a.depth - b.depth);
  for (const item of drawList) item.fn();

  // Speech bubbles
  for (const b of bubbleQueue) {
    drawSpeechBubble(b.x, b.y);
  }

  // Floating demo label
  if (demo.label && demo.labelAgent) {
    const agent = agents.find(a => a.name === demo.labelAgent);
    if (agent) {
      const pos = isoToScreen(agent.renderGx, agent.renderGy);
      const lfs = Math.max(7, Math.round(9.9 * s));
      ctx.font = `${lfs}px "SF Mono", "Courier New", monospace`;
      const tw = ctx.measureText(demo.label).width;
      const lx = pos.x;
      const ly = pos.y - 70 * s;
      ctx.fillStyle = 'rgba(88,166,255,0.15)';
      ctx.fillRect(lx - tw / 2 - 4, ly - lfs, tw + 8, lfs + 4);
      ctx.fillStyle = '#58a6ff';
      ctx.textAlign = 'center';
      ctx.fillText(demo.label, lx, ly);
    }
  }
}

// ── Animation loop ─────────────────────────────────────────────
function animLoop(timestamp) {
  const dt = lastFrameTime ? (timestamp - lastFrameTime) / 1000 : 0.016;
  lastFrameTime = timestamp;
  const cappedDt = Math.min(dt, 0.1);
  animTime += cappedDt;

  updateAgents(cappedDt);
  updatePantryVisits(cappedDt);
  processLiveEvents();         // handle real-time WS events
  if (!liveMode) updateDemo(cappedDt);  // demo loop pauses during live events
  updateNPCs(cappedDt);
  draw();

  requestAnimationFrame(animLoop);
}

requestAnimationFrame(animLoop);
</script>
</body>
</html>
